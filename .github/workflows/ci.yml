name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  syntax-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Syntax check
      run: python -m compileall -q .
